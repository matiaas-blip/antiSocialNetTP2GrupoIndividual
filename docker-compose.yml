version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis
    container_name: redis_local
    ports:
      - "6379:6379"


volumes:
  mongo_data: